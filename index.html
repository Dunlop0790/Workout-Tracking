<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workout Club</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div id="root">

  <!-- Setup screen — only visible if config isn't filled in -->
  <div id="setup-screen" style="display:none; max-width:500px; margin:60px auto; padding:0 20px;">
    <div style="background:#fff; border:1px solid rgba(0,0,0,0.1); border-radius:12px; padding:28px; box-shadow:0 1px 4px rgba(0,0,0,0.07);">
      <h2 style="font-size:18px; font-weight:600; margin-bottom:8px;">Almost there</h2>
      <p style="font-size:14px; color:#6b6b6b; line-height:1.6; margin-bottom:16px;">
        Open <code style="background:#f4f4f2; padding:1px 6px; border-radius:4px; font-size:13px;">supabase-config.js</code>
        and paste your Supabase URL and anon key. Then run the SQL block in the same file inside your
        Supabase SQL editor to create the tables. That's it.
      </p>
      <p style="font-size:13px; color:#aaa;">Find your keys at app.supabase.com → your project → Settings → API</p>
    </div>
  </div>

  <!-- Header -->
  <header>
    <div class="header-top">
      <div>
        <h1>Workout Club</h1>
        <p class="week-label" id="weekLabel"></p>
      </div>
      <div class="team-stat" id="teamStat"></div>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="tracker">Tracker</button>
      <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
    </nav>
  </header>

  <!-- Tracker -->
  <section class="panel active" id="panel-tracker">
    <div id="member-list"></div>
    <div id="add-area"></div>
  </section>

  <!-- Leaderboard -->
  <section class="panel" id="panel-leaderboard">
    <div class="period-tabs" id="periodTabs">
      <button class="period-btn active" data-period="week">This week</button>
      <button class="period-btn" data-period="month">This month</button>
      <button class="period-btn" data-period="6mo">6 months</button>
      <button class="period-btn" data-period="12mo">12 months</button>
    </div>
    <div id="leaderboard-list"></div>
  </section>

</div>

<div class="credit">Made by Corey Hausterman</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
